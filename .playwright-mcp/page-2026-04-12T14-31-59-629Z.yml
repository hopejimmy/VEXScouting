                      - paragraph [ref=e853]: "Another update:"
                      - paragraph [ref=e854]: I wasn’t able to make as much progress as I hoped (I moved between coasts, which limited most of my time), but I rebuilt a lot of the backend and improved the API.
                      - paragraph [ref=e855]: "API Changes:"
                      - list [ref=e856]:
                        - listitem [ref=e857]: Added data on qualifications
                        - listitem [ref=e858]: Added worlds skills rankings (you can’t see a specific team’s position, but you can see the top 150)
                        - listitem [ref=e859]: Added the ability to find events by a time frame
                        - listitem [ref=e860]: Added a required season field to a lot of the queries
                        - listitem [ref=e861]: Added more verification on some fields
                        - listitem [ref=e862]:
                          - text: Changed the
                          - code [ref=e863]: Event.ongoing
                          - text: field to be more dynamic and not depend on the RobotEvents value (in preparation for completely live event results).
                        - listitem [ref=e864]: Fixed time issues (I accidentally had forced times to be in UTC, without actually parsing and changing the timezone)
                        - listitem [ref=e865]: Fixed data model (I had a lot of fields marked as nullable that shouldn’t have been)
                        - listitem [ref=e866]: Remove some useless data (specifically the event type, which was always null)
                      - paragraph [ref=e867]: "Backend changes:"
                      - list [ref=e868]:
                        - listitem [ref=e869]: Fixed error logging
                        - listitem [ref=e870]: Cleaned up how the scraper was adding data
                        - listitem [ref=e871]: Added a postgres trigger that sends a postgres notification when data is changed (in preparation for scraping the RobotEvents WebSocket, live data, and push notifications)
