                  - generic [ref=e266]:
                    - generic [ref=e267]:
                      - paragraph [ref=e268]: Hey everyone,
                      - paragraph [ref=e269]: In lieu of VexDB no longer being supported, and me getting increasingly agitated at VEX Via and the RobotEvents API, I have decided to start working on a completely custom API (with data scraped every few hours from the RobotEvents API). I’m primarily designing the API for a mobile app and website that I’m building as part of this project, to make it easier to monitor competition data (I know that “every few hours” is not very suited for a VEX Via alternative, so that’s why I have plans to make competition results completely live) and explore teams and events in an easier way.
                      - paragraph [ref=e270]:
                        - text: The API is currently public with an explanation at
                        - link "theredalliance.xyz link clicked 312 times" [ref=e271] [cursor=pointer]:
                          - /url: https://theredalliance.xyz/
                          - text: theredalliance.xyz 312
                        - text: (just keep in mind that it might not be online 100% of time time before I release the app, notably it’ll be down for a few hours within the next few days to push an update to allow people to get award data).
                      - paragraph [ref=e272]: I do not have a specific release date, as the amount of time I have to dedicate to this project fluctuates, but I’m doing my best to finish a production Google Play Store release of the app finished within a month (for an iOS release I will need to scope out how interested people are, because I do not want to accidentally pay $100 for an App Store developer account if people wouldn’t use the app anyway).
                      - paragraph [ref=e273]: "My plans for the app are:"
                      - list [ref=e274]:
                        - listitem [ref=e275]: Everything that VEX Via currently offers
                        - listitem [ref=e276]: Notifications, and live-updating data
                        - listitem [ref=e277]: A centralized feed with events that your team is registered for, and results
                        - listitem [ref=e278]: An easy search bar to find teams and events
                      - paragraph [ref=e279]: If you want data in bulk for analytical purposes, scouting, etc, I am planning on publishing daily database exports (with history).
                      - paragraph [ref=e280]:
                        - text: Any questions or suggestions are welcome as I’m doing my best to suit the needs of most teams. You could contact me here or email me
                        - link "m@yarn.network" [ref=e281] [cursor=pointer]:
                          - /url: mailto:m@yarn.network
