                      - code [ref=e426]: "// getREData(url) will return a JSON for the url sent. See the API to get those together. This will not handle multi page data yet, but that wouldn't be too hard to do. I use \"&per_page=250\" and with this work I'm not worried about hitting the 250 limit. (But I should do it correctly and the additional pages.) If someone does it send it my way to add it in. function getREData(url) { var headers = { \"headers\":{ \"accept\": \"application/json\", \"Authorization\": \"Bearer ###TOKEN###\"} }; var response = UrlFetchApp.fetch(url, headers); var content = response.getContentText(); var data = JSON.parse(content); return(data); } // This is just a testing function that I used as I wrote the code. function retestcode() { temp = getSkillsFromTeam(\"11029A\"); // Not my school anymore, but my first team to qualify to WORLDS. Logger.log(temp) } // This will return an array goven the team number: [[robotSkills,autoPart,driverPart,bestAuto,bestDriver]] function getSkillsFromTeam(teamNumber){ // Turn the team number into their ID var teamCode = getREData(\"https://www.robotevents.com/api/v2/teams?number%5B%5D=\" + teamNumber + \"&myTeams=false&program%5B%5D=41&&per_page=250\"); teamCode = parseInt(teamCode['data'][0]['id']); // Get all the skills scores for that team by ID var listSkills = getREData(\"https://www.robotevents.com/api/v2/teams/\" + teamCode + \"/skills?season%5B%5D=180&per_page=250\"); listSkills = listSkills['data']; // Get the events that the team went to from that list. I could do that with a seperate call but I already have the data from the scores. You need to match the programming and skills scores to add them together. I don't think this would work with leagues. var eventList = []; for (var i = 0; i < listSkills.length; i++) { if( !eventList.includes(listSkills[i]['event']['id'])) {eventList.push(listSkills[i]['event']['id']);} } // I then go through each event, pull out the scores for that event, then add them together and save them if it's a better score. I'm not worried about tiebreakers at this point, especially because we don't have the data needed to do that properly. I assume there's some way to do a pivot table and just sort it but I don't know how. This wasn't too hard though, just clunky. We return a -1 if we don't find a skills score. var robotSkills = -1; var driverPart = -1; var autoPart = -1; var thisdriver = -1; var thisauto = -1; var bestAuto = -1; var bestDriver = -1; for (var i = 0; i < eventList.length; i++) { for (var j = 0; j < listSkills.length; j++) { if(listSkills[j]['event']['id'] == eventList[i]) { if(listSkills[j]['type'] == \"programming\") { thisauto = listSkills[j]['score']; if (thisauto > bestAuto) {bestAuto = thisauto} } else { thisdriver = listSkills[j]['score']; if (thisdriver > bestDriver) {bestDriver = thisdriver} } } } if(thisdriver + thisauto > robotSkills) { var robotSkills = thisdriver + thisauto; var driverPart = thisdriver; var autoPart = thisauto; } } return [[robotSkills,autoPart,driverPart,bestAuto,bestDriver]]; } // This function will take an RE code and return a list of teams. function getTeamsFromEvent(reCode){ // Turn the code into an event ID. var eventcode = getREData(\"https://www.robotevents.com/api/v2/events?sku%5B%5D=\" + reCode + \"&myEvents=false\"); eventcode = parseInt(eventcode['data'][0]['id']); // Get the teams from the event. var eventTeams = getREData(\"https://www.robotevents.com/api/v2/events/\"+eventcode+\"/teams?myTeams=false&per_page=250\"); eventTeams = eventTeams['data']; var teamList = []; // Iterate through the list to get just the teams. for (var i = 0; i < eventTeams.length; i++) { teamList[i] = eventTeams[i]['number']; } return teamList; }"
