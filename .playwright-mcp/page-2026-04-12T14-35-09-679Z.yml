                  - generic [ref=e215]:
                    - generic [ref=e216]:
                      - paragraph [ref=e217]: Hey everyone,
                      - paragraph [ref=e218]: So I’m sure we all know how slow Robot Events can be sometimes if you’re attempting to get lots of data, as well as the fact that it’s often hard to get the information you’re looking for when doing statistics / analysis.
                      - paragraph [ref=e219]:
                        - text: Anyway, without any further explaining, I’m pleased to announce my latest creation for people to use, an (almost)
                        - link "Robot Events API link clicked 536 times" [ref=e220] [cursor=pointer]:
                          - /url: http://vex.us.nallen.me/the_data%22
                          - text: Robot Events API 536
                        - text: .
                        - img ":smiley:" [ref=e221]
                      - paragraph [ref=e222]: It works by scraping data from Robot Events periodically (through HTML and the CSV files), keeping all of it in a database, and creating an API that accesses that database. So know that this isn’t directly interfacing with Robot Events, but does enable quite a lot more nice information to be gathered.
                      - paragraph [ref=e223]:
                        - text: Documentation (with examples) is available through the link posted above, and feel free to ask any questions in the thread.
                        - img ":slight_smile:" [ref=e224]
                      - paragraph [ref=e225]: "There are a couple of things to note:"
                      - list [ref=e226]:
                        - listitem [ref=e227]: At the moment the database is only updated every 2 minutes, but I might bring it down to 1 minute depending on how things go.
                        - listitem [ref=e228]: The API is currently completely public but if demand is crazy I may implement a more closed system for those who want it (I’ll make an announcement if I do).
                      - paragraph [ref=e229]: "Also, other things that I’ll look at implementing soon:"
                      - list [ref=e230]:
                        - listitem [ref=e231]: “Last changed” times for events.
                        - listitem [ref=e232]: Push Notifications for changes.
                      - paragraph [ref=e233]:
                        - text: Any other suggestions are completely welcome, whether you have another kind of ranking method you want implemented other than TRSP, or another way of filtering results, all are welcome!
                        - img ":slight_smile:" [ref=e234]
                      - paragraph [ref=e235]:
                        - text: Also, on a kind of related note, the rest of that site that the API is hosted on (http://vex.us.nallen.me/) uses the same data as an example of how extra links (events by team, etc.) can be created and used. This site is still being worked on a bit (ie. the Team Info page is a bit lacking), and was started before the other (better) scouting databases were created
                        - img ":stuck_out_tongue:" [ref=e236]
                        - text: so it might not be terribly useful, but oh well!
                      - paragraph [ref=e237]: I hope that at least someone finds this API useful and enables a lot more great websites that do statistics or analysis on teams / games / events / whatever!
                      - paragraph [ref=e238]: Have fun!
