                          - text: "LegoMindstormsmaniac:"
                        - blockquote [ref=e1041]:
                          - paragraph [ref=e1042]: First of all I think this is great. If you can implement update dates/times, that would be really helpful for me. And push notifications would be awesome to have sometime in the future. One problem, I notice that when I do a “get_teams” query, it limits the results to 5000. Similarly, “get_matches” and “get_rankings” are limited to 10000. Those two aren’t as much of a problem, as I plan on only updating those per event, separately. However, teams would be updated every day/week or so, all at once. Right now I plan on using a link I found awhile back that directly accesses the Robot Events database.
                      - paragraph [ref=e1043]:
                        - text: So this is one of the many things that I’ve added / worked on over the last little while and I’ll explain below.
                        - img ":stuck_out_tongue:" [ref=e1044]
                      - paragraph [ref=e1045]: "Things that have been added / changed:"
                      - list [ref=e1046]:
                        - listitem [ref=e1047]: Ability to limit teams search by region / city has been added.
                        - listitem [ref=e1048]:
                          - text: All requests that have a parameter for season now have an extra valid option called “current” which will limit to the current season.
                          - img ":smiley:" [ref=e1049]
                        - listitem [ref=e1050]:
                          - text: The accompanying web page has been converted to use the API for its information (as proof it can be used
                          - img ":wink:" [ref=e1051]
                          - text: ).
                        - listitem [ref=e1052]:
                          - link "Graphs link clicked 4 times" [ref=e1053] [cursor=pointer]:
                            - /url: http://vex.us.nallen.me/the_data/requests
                            - text: Graphs 4
                          - text: have been added to show some information about how the API is being used (the graphs might look a bit weird while the data set is small).
                          - img ":stuck_out_tongue:" [ref=e1054]
                        - listitem [ref=e1055]: Ability to get total number of results (without the data) has been added for all types of requests through the “nodata” parameter.
                        - listitem [ref=e1056]: Results are now limited in size by default. This had to happen at some point, otherwise the arrays being generated and encoded that are very large in size, contributing to excessive RAM usage (and often then errors). I felt this was the best option as very large data pulls should be relatively rare. The API Docs have been updated to reflect this and have an example about how to do a very large request on them.
                      - paragraph [ref=e1057]: "Basically, if you still want to do a massive grab of information you’ll have to do it bit by bit (amount of iterations will vary based on the number of results):"
                      - list [ref=e1058]:
                        - listitem [ref=e1059]: Do a request with parameter “nodata” set to true to get the total results.
                        - listitem [ref=e1060]: Do a request for the results including data, recording all the results you get.
                        - listitem [ref=e1061]: If the size of your results is less than the total expected - re-perform Step 2 with parameter “limit_start” set to the size of your results.
                      - paragraph [ref=e1062]:
                        - text: Sorry for any inconvenience this causes (even though it is only a few more lines of code) to anyone but it’s the only way I can reliably guarantee that things won’t break as more and more events are known.
