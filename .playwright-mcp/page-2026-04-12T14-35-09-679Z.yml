                      - paragraph [ref=e792]:
                        - text: This is now active!
                        - img ":slight_smile:" [ref=e793]
                        - text: When getting data about teams there is a new field called “grade” which tells you whether a team is High School or Middle School. The API docs have been updated for this change. It uses the grade of the team as of the most recent event they attended (or are going to attend). So for teams that have not attended events this will default to High School.
                      - paragraph [ref=e794]: "In other news, I’ve been talking to someone from IFI (he’s been REALLY helpful with extra information! :D) and the timings of scraping data have been worked on so as to not put crazy loads / requests on their server, whilst still keeping the database up to date:"
                      - list [ref=e795]:
                        - listitem [ref=e796]: Data of Current Events will update every 2 minutes while the event is running (this isn’t going to become more often, IFI already made this possible, down from 5 minutes).
                        - listitem [ref=e797]: Team Lists will update every 6 Hours from when they are available until the event ends.
                        - listitem [ref=e798]: Event Information will be updated 24-hourly until the event is over.
                        - listitem [ref=e799]: New events / teams will be checked for and added 6-hourly.
